<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex-box</title>
    <style>
        div.conteiner{
            display: flex;
            background-color: greenyellow;
            flex-flow: row nowrap;
            text-align: center;
            
        }
        div.item{
            background-color: lightblue;
            border: 1px solid black;
            flex-basis: 200px;
        }

        div#cxa{
            flex-grow: 1;
            flex-shrink: 1;
        }
        
        div#cxb{
            flex-grow: 2;
            flex-shrink: 0;
        }

        div#cxc{
            flex-grow: 0;
            flex-shrink: 2;
        }
    </style>
</head>
<body>
    <h1>Testando o flex-box</h1>
    <div class="conteiner">
        <div class="item" id="cxa">A</div>
        <div class="item" id="cxb">B</div>
        <div class="item" id="cxc">C</div>
    </div>
</body>
</html>
