<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex-box</title>
    <style>
        div.conteiner{
            display: flex;
            background-color: aqua;
            flex-flow: row wrap;
            height: 500px;
            align-items: flex-start;
            justify-content: space-evenly;
        }
        div.item{
            background-color: blueviolet;
            padding: 20px;
        }
        div#i1{
            align-self: auto;
        }
        div#i2{
            align-self: center;
        }
        div#i3{
            align-self: flex-start;
        }
        div#i4{
            align-self: flex-end;
        }
        div#i5{
            align-self: center;
        }
        div#i6{
            align-self: stretch;
        }
        div#i7{
            align-self: flex-end;
        }
    </style>
</head>
<body>
    <h1>Testando o flex-box</h1>
    <div class="conteiner">
        <div class="item" id="i1">A</div>
        <div class="item" id="i2">B</div>
        <div class="item" id="i3">C</div>
        <div class="item" id="i4">D</div>
        <div class="item" id="i5">E</div>
        <div class="item" id="i6">F</div>
        <div class="item" id="i7">G</div>
    </div>
</body>
</html>
