<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex-box</title>
    <style>
        div.conteiner{
            display: flex;
            background-color: aqua;
            flex-flow: row wrap;
        }
        div.item{
            background-color: blueviolet;
            padding: 20px;
            
        }
        div#i1{
            order: 0;
        }
        div#i2{
            order: 5;
        }
        div#i3{
            order: 23;
        }
        div#i4{
            order: 1;
        }
        div#i5{
            order: -1;
        }
        div#i6{
            order: -2;
        }
        div#i7{
            order: 2;
        }
    </style>
</head>
<body>
    <h1>Testando o flex-box</h1>
    <div class="conteiner">
        <div class="item" id="i1">A</div>
        <div class="item" id="i2">B</div>
        <div class="item" id="i3">C</div>
        <div class="item" id="i4">D</div>
        <div class="item" id="i5">E</div>
        <div class="item" id="i6">F</div>
        <div class="item" id="i7">G</div>
    </div>
</body>
</html>
