<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Teste de Formulário</h1>
    <form autocomplete="on" action="cadastro.php" method="get">
        <p>
            <label for="inome">Nome:</label>
            <input autocomplete="name" maxlength="30" required placeholder="Digite seu nome completo" type="text" name="nome" id="inome">
        </p>
        <p>
            <label for="imedia">Média</label>
            <input value="5" step="0.5" size="10" required placeholder="0 a 10" max="10" min="0" type="number" name="media" id="imedia">
        </p>
        <p>
            <label for="imes">Período Letivo:</label>
            <input required type="month" name="mes" id="imes">
        </p>
        <p>
            <label for="idia">Dia da Prova:</label>
            <input required type="date" name="dia" id="idia">
        </p>
        <p>
            <label for="ihora">Horario da Prova:</label>
            <input required type="time" name="hora" id="ihora">
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
