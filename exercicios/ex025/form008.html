<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de formulário</h1>
    <form autocomplete="on" action="cadastro.php" method="post">
        <p>
            <label for="in1">Digite um número:</label>
            <input oninput="isoma.innerHTML = Number(in1.value) + Number(in2.value)" min="0" type="number" name="n1" id="in1">
        </p>
        <p>
            <label  for="in2">Digite outro número:</label>
            <input oninput="isoma.innerHTML = Number(in1.value) + Number(in2.value)" min="0" type="number" name="n2" id="in2">
        </p>
        <p>
            <label for="isoma">Soma</label>
            <output name="soma" id="isoma">0</output>
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
