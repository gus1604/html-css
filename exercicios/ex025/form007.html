<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de formulário</h1>
    <form autocomplete="on" action="cadastro.php" method="post">
        <p>
                <label for="iest">Estado:</label>
                <select name="est" id="iest">
                    <option selected value="">--- Escolha---</option>
                    <optgroup label="Região Sudeste">
                        <option value="SP">São Paulo</option>
                        <option value="RJ">Rio de Janeiro</option>
                        <option value="MG">Minas Gerais</option>
                    </optgroup>

                    <optgroup label="Região Norderste">
                        <option value="RN">Rio Grande do Norte</option>
                        <option value="PE">Pernambuco</option>
                        <option value="MA">Maranhão</option>
                    </optgroup>
                </select>
        </p>
        <p>
            <label for="iprof">Profissão:</label>
            <input list="lstprof" type="text" name="prof" id="iprof">
            <datalist id="lstprof">
                <option value="ADM">Administrador</option>
                <option value="CONT">Contador</option>
                <option value="DEV">Desenvolvedor</option>
                <option value="PROF">Professor</option>
            </datalist>
        </p>
        <p>
            <label for="imesg">Mensagem:</label> <br>
            <textarea cols="30" rows="10" name="msg" id="imesg"></textarea>
        </p>
        <p>
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
